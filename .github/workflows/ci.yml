name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Type-check · Lint · Format · Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check (astro check + tsc)
        run: bun run check

      - name: Lint (eslint)
        run: bun run lint

      - name: Format (prettier)
        run: bun run format:check

      - name: Dead code (knip)
        run: bun run knip
