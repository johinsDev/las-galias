services:
  postgres:
    image: postgres:16-alpine
    container_name: las-galias-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: strapi
      POSTGRES_PASSWORD: strapi
      POSTGRES_DB: lasgalias
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U strapi -d lasgalias"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
